<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My PDF Website</title>
    <style>
        /* Make the PDF fill the whole screen */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #333; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }

        /* The Download Button Styling */
        .download-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #007bff;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }
        .download-btn:hover { transform: scale(1.05); background-color: #0056b3; }
    </style>
</head>
<body>
    <iframe src="document.pdf#toolbar=0" title="PDF Document">
        <p style="color: white; text-align: center; padding: 2rem;">
            Your browser can't display PDFs.
            <a href="document.pdf" style="color: #7ab8ff;">Download it instead</a>.
        </p>
    </iframe>

    <a href="document.pdf" download class="download-btn" aria-label="Download PDF">
        <!-- Download arrow icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Download PDF</span>
    </a>
</body>
</html>
